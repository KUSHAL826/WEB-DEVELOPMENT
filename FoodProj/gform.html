<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spice Booking - GNA PRODUCTIONS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#fafafa;
color:#333;
}

header{
background:#4CAF50;
color:white;
text-align:center;
padding:30px;
}

.booking-section{
padding:40px 15%;
}

h2{
text-align:center;
margin-bottom:25px;
color:#388E3C;
}

.user-info input{
display:block;
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

.item-row{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}

.item-row select,
.item-row input{
padding:8px;
border:1px solid #ccc;
border-radius:5px;
flex:1;
}

.item-price{
width:100px;
text-align:right;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

#addItemBtn{
background:#4CAF50;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
margin-top:10px;
cursor:pointer;
}

.confirm-btn{
background:#388E3C;
color:white;
padding:12px;
border:none;
border-radius:5px;
width:100%;
margin-top:20px;
cursor:pointer;
}

.total{
margin:20px 0;
font-size:20px;
text-align:right;
}

footer{
background:#4CAF50;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

.message{
color:red;
font-weight:bold;
text-align:center;
margin-top:10px;
}
</style>

</head>

<body>

<header>
<h1>🌿 GNA PRODUCTIONS - Spice Booking</h1>
</header>

<section class="booking-section">

<h2>Place Your Order</h2>

<form id="orderForm" name="SpiceBooking" method="POST" data-netlify="true" action="confirmation.html">

<input type="hidden" name="form-name" value="SpiceBooking">

<div class="user-info">

<input type="text" name="name" id="name" placeholder="Full Name" required>

<input type="tel" name="phone" id="phone" placeholder="Phone Number" required>

<input type="text" name="address" id="address" placeholder="Address" required>

<input type="text" name="pincode" id="pincode" placeholder="Pincode" required>

</div>

<div id="pincodeMessage" class="message"></div>

<h3>Items</h3>

<div id="itemsContainer">

<div class="item-row">

<select class="item-name" name="item[]">
<option disabled selected>Select Spice</option>
<option data-price="500">Chilli Powder ₹500/kg</option>
<option data-price="500">Turmeric Powder ₹500/kg</option>
<option data-price="500">Coriander Powder ₹500/kg</option>
<option data-price="500">Cumin Powder ₹500/kg</option>
<option data-price="500">Black Pepper Powder ₹500/kg</option>
<option data-price="500">Garam Masala ₹500/kg</option>
</select>

<input type="number" name="weight[]" class="item-weight" placeholder="Weight (kg)" step="0.1">

<span class="item-price">₹0</span>

<button type="button" class="remove-btn" onclick="removeItem(this)">Remove</button>

</div>

</div>

<button type="button" id="addItemBtn">+ Add Item</button>

<div class="total">
Total Price: ₹ <span id="totalPrice">0</span>
</div>

<input type="hidden" name="total" id="totalInput">

<button type="submit" class="confirm-btn">Confirm Booking</button>

</form>

</section>

<footer>
© 2026 GNA PRODUCTIONS
</footer>

<script>

const itemsContainer = document.getElementById("itemsContainer");
const totalPrice = document.getElementById("totalPrice");
const totalInput = document.getElementById("totalInput");
const addItemBtn = document.getElementById("addItemBtn");
const pincode = document.getElementById("pincode");
const message = document.getElementById("pincodeMessage");
const form = document.getElementById("orderForm");

function calculateTotal(){

let total = 0;

document.querySelectorAll(".item-row").forEach(row=>{

const select = row.querySelector(".item-name");
const weightInput = row.querySelector(".item-weight");

if(!select || !weightInput) return;

const price = select.options[select.selectedIndex]?.dataset.price || 0;
const weight = parseFloat(weightInput.value) || 0;

const itemTotal = price * weight;

row.querySelector(".item-price").innerText = "₹" + itemTotal;

total += itemTotal;

});

totalPrice.innerText = total;
totalInput.value = total;

}

itemsContainer.addEventListener("input", calculateTotal);
itemsContainer.addEventListener("change", calculateTotal);


addItemBtn.onclick = function(){

const row = document.createElement("div");

row.className = "item-row";

row.innerHTML = `
<select class="item-name" name="item[]">
<option disabled selected>Select Spice</option>
<option data-price="500">Chilli Powder ₹500/kg</option>
<option data-price="500">Turmeric Powder ₹500/kg</option>
<option data-price="500">Coriander Powder ₹500/kg</option>
<option data-price="500">Cumin Powder ₹500/kg</option>
<option data-price="500">Black Pepper Powder ₹500/kg</option>
<option data-price="500">Garam Masala ₹500/kg</option>
</select>

<input type="number" name="weight[]" class="item-weight" placeholder="Weight (kg)" step="0.1">

<span class="item-price">₹0</span>

<button type="button" class="remove-btn" onclick="removeItem(this)">Remove</button>
`;

itemsContainer.appendChild(row);

};


function removeItem(btn){

btn.parentElement.remove();
calculateTotal();

}


function checkPincode(){

if(pincode.value !== "572125"){

message.innerText = "⚠ Delivery only available for pincode 572125";

}else{

message.innerText = "";

}

}

pincode.addEventListener("input", checkPincode);
pincode.addEventListener("blur", checkPincode);


form.addEventListener("submit", function(e){

if(pincode.value !== "572125"){

e.preventDefault();

message.innerText = "⚠ Order cannot be placed outside pincode 572125";

return;

}

let orderItems = [];

document.querySelectorAll(".item-row").forEach(row=>{

const spice = row.querySelector(".item-name").value;
const weight = parseFloat(row.querySelector(".item-weight").value) || 0;
const price = row.querySelector(".item-name").selectedOptions[0]?.dataset.price || 0;

if(spice && weight){

orderItems.push({
name: spice,
weight: weight,
price: price * weight
});

}

});

const orderData = {
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
address: document.getElementById("address").value,
pincode: pincode.value,
total: totalInput.value,
orderItems: orderItems
};

localStorage.setItem("orderData", JSON.stringify(orderData));

});


</script>

</body>
</html>
